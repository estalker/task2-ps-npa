services:
  neo4j:
    image: neo4j:5-community
    container_name: task2_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # dev only
      NEO4J_AUTH: "neo4j/neo4j_password"
      NEO4J_server_memory_pagecache_size: "512M"
      NEO4J_server_memory_heap_initial__size: "512M"
      NEO4J_server_memory_heap_max__size: "512M"
      # allow procedures if you later add APOC (not enabled by default here)
      NEO4J_dbms_security_procedures_unrestricted: ""
    volumes:
      - neo4j_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: task2_ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: task2_frontend
    depends_on:
      - neo4j
    ports:
      - "8080:8000"
    extra_hosts:
      # Make host.docker.internal work on Linux Docker Engine too.
      - "host.docker.internal:host-gateway"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4j_password"
      # Default: host Ollama (Windows/Mac Docker Desktop, or Linux host-gateway).
      # Linux + Ollama-in-docker: run with profile `ollama` AND set OPENAI_BASE_URL=http://ollama:11434/v1
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}"
      OPENAI_API_KEY: "local"
    volumes:
      - ./input:/workspace/input
      - ./output:/workspace/output

volumes:
  neo4j_data:
  ollama_data:

